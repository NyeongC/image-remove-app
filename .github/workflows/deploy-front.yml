name: Deploy Front

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-front.yml'

jobs:
  deploy-front:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NGINX_SSH_KEY }}" > ~/.ssh/nginx_key
          chmod 600 ~/.ssh/nginx_key
          ssh-keyscan -H ${{ secrets.NGINX_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/nginx_key ${{ secrets.SSH_USER }}@${{ secrets.NGINX_HOST }} "mkdir -p /home/ubuntu/app/front"

      - name: Copy dist to Nginx
        run: |
          scp -i ~/.ssh/nginx_key -r dist/* ${{ secrets.SSH_USER }}@${{ secrets.NGINX_HOST }}:/home/ubuntu/app/front/

      - name: Deploy to Nginx
        run: |
          ssh -i ~/.ssh/nginx_key ${{ secrets.SSH_USER }}@${{ secrets.NGINX_HOST }} << 'EOF'
            FRONT_SRC=/home/ubuntu/app/front
            NGINX_ROOT=/var/www/html

            echo "Check uploaded files"
            ls -al $FRONT_SRC

            echo "Remove old frontend files"
            sudo rm -rf $NGINX_ROOT/*

            echo "Copy new frontend files"
            sudo cp -r $FRONT_SRC/* $NGINX_ROOT/

            echo "Reload nginx"
            sudo systemctl reload nginx

            echo "Deploy front completed"
          EOF
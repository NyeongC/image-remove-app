name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/image-remove/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/image-remove

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Spring Boot
        run: ./gradlew clean build -x test

      - name: Prepare jar
        run: |
          mkdir -p deploy
          ls -al build/libs
          cp $(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n 1) deploy/app.jar
          ls -al deploy

      - name: Copy jar to WAS1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WAS1_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS1_SSH_KEY }}
          source: "backend/image-remove/deploy/app.jar"
          target: "/home/ubuntu/app/api"
          strip_components: 4

      - name: Restart WAS1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WAS1_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS1_SSH_KEY }}
          script: |
            APP_DIR=/home/${{ secrets.SSH_USER }}/app/api
            APP_JAR=$APP_DIR/app.jar
            APP_LOG=$APP_DIR/app.log
            APP_PID=$APP_DIR/app.pid

            mkdir -p $APP_DIR

            if [ -f "$APP_PID" ]; then
              OLD_PID=$(cat "$APP_PID")
              if ps -p "$OLD_PID" > /dev/null 2>&1; then
                echo "Killing old process: $OLD_PID"
                kill -15 "$OLD_PID"
                sleep 3
              fi
              rm -f "$APP_PID"
            fi

            nohup java -jar "$APP_JAR" \
              --spring.profiles.active=prod \
              > "$APP_LOG" 2>&1 &

            echo $! > "$APP_PID"

            sleep 5

            echo "Started process:"
            ps -p $(cat "$APP_PID") -f

      - name: Copy jar to WAS2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WAS2_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS2_SSH_KEY }}
          source: "backend/image-remove/deploy/app.jar"
          target: "/home/ubuntu/app/api"
          strip_components: 4

      - name: Restart WAS2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WAS2_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS2_SSH_KEY }}
          script: |
            APP_DIR=/home/${{ secrets.SSH_USER }}/app/api
            APP_JAR=$APP_DIR/app.jar
            APP_LOG=$APP_DIR/app.log
            APP_PID=$APP_DIR/app.pid

            mkdir -p $APP_DIR

            if [ -f "$APP_PID" ]; then
              OLD_PID=$(cat "$APP_PID")
              if ps -p "$OLD_PID" > /dev/null 2>&1; then
                echo "Killing old process: $OLD_PID"
                kill -15 "$OLD_PID"
                sleep 3
              fi
              rm -f "$APP_PID"
            fi

            nohup java -jar "$APP_JAR" \
              --spring.profiles.active=prod \
              > "$APP_LOG" 2>&1 &

            echo $! > "$APP_PID"

            sleep 5

            echo "Started process:"
            ps -p $(cat "$APP_PID") -f
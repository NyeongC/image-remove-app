name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/image-remove/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/image-remove

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Spring Boot
        run: ./gradlew clean build -x test

      - name: Prepare jar
        run: |
          mkdir -p deploy
          cp build/libs/*.jar deploy/app.jar

      - name: Copy jar to WAS1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WAS1_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS1_SSH_KEY }}
          source: "backend/image-remove/deploy/app.jar"
          target: "/home/ubuntu/app/api"
          strip_components: 3

      - name: Restart WAS1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WAS1_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS1_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app/api
            pkill -f '/home/ubuntu/app/api/app.jar' || true
            nohup java -jar /home/ubuntu/app/api/app.jar \
              --spring.profiles.active=prod \
              > /home/ubuntu/app/api/app.log 2>&1 &
            sleep 3
            ps -ef | grep app.jar | grep -v grep

      - name: Copy jar to WAS2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WAS2_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS2_SSH_KEY }}
          source: "backend/image-remove/deploy/app.jar"
          target: "/home/ubuntu/app/api"
          strip_components: 3

      - name: Restart WAS2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WAS2_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app/api
            pkill -f '/home/ubuntu/app/api/app.jar' || true
            nohup java -jar /home/ubuntu/app/api/app.jar \
              --spring.profiles.active=prod \
              > /home/ubuntu/app/api/app.log 2>&1 &
            sleep 3
            ps -ef | grep app.jar | grep -v grep
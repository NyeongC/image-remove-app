name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/image-remove/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/image-remove

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Spring Boot
        run: ./gradlew clean build -x test

      - name: Prepare jar
        run: |
          mkdir -p deploy
          ls -al build/libs
          cp $(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n 1) deploy/app.jar
          ls -al deploy

      - name: Copy jar to WAS1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WAS1_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS1_SSH_KEY }}
          source: "backend/image-remove/deploy/app.jar"
          target: "/home/ubuntu/app/api"
          strip_components: 3

      - name: Restart WAS1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WAS1_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS1_SSH_KEY }}
          script: |
            APP_DIR=/home/ubuntu/app/api
            APP_JAR=$APP_DIR/app.jar
            APP_LOG=$APP_DIR/app.log
            APP_PID=$APP_DIR/app.pid

            mkdir -p $APP_DIR
            ls -al $APP_DIR

            echo "Stopping old process by PID file..."
            if [ -f "$APP_PID" ]; then
              OLD_PID=$(cat "$APP_PID")
              if ps -p "$OLD_PID" > /dev/null 2>&1; then
                echo "Killing old process from pid file: $OLD_PID"
                kill -15 "$OLD_PID" || true
                sleep 5
              fi
              rm -f "$APP_PID"
            fi

            echo "Stopping process using port 8080..."
            PORT_PID=$(lsof -ti:8080 || true)

            if [ -n "$PORT_PID" ]; then
              echo "Killing process using 8080: $PORT_PID"
              kill -15 $PORT_PID || true
              sleep 5
            fi

            PORT_PID=$(lsof -ti:8080 || true)

            if [ -n "$PORT_PID" ]; then
              echo "Force killing process using 8080: $PORT_PID"
              kill -9 $PORT_PID || true
              sleep 2
            fi

            echo "Starting new application..."
            nohup env \
              R2_ACCESS_KEY="${{ secrets.R2_ACCESS_KEY }}" \
              R2_SECRET_KEY="${{ secrets.R2_SECRET_KEY }}" \
              R2_ENDPOINT="${{ secrets.R2_ENDPOINT }}" \
              R2_PUBLIC_URL="${{ secrets.R2_PUBLIC_URL }}" \
              RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}" \
              RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
              DB_HOST="${{ secrets.DB_HOST }}" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              java -jar "$APP_JAR" \
              --spring.profiles.active=prod \
              > "$APP_LOG" 2>&1 &

            echo $! > "$APP_PID"

            sleep 8

            echo "Started process:"
            ps -p $(cat "$APP_PID") -f || true

            echo "Recent logs:"
            tail -n 80 "$APP_LOG"

      - name: Copy jar to WAS2
        if: false
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WAS2_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS2_SSH_KEY }}
          source: "backend/image-remove/deploy/app.jar"
          target: "/home/ubuntu/app/api"
          strip_components: 3

      - name: Restart WAS2
        if: false
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WAS2_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.WAS2_SSH_KEY }}
          script: |
            APP_DIR=/home/ubuntu/app/api
            APP_JAR=$APP_DIR/app.jar
            APP_LOG=$APP_DIR/app.log
            APP_PID=$APP_DIR/app.pid

            mkdir -p $APP_DIR
            ls -al $APP_DIR

            echo "Stopping old process by PID file..."
            if [ -f "$APP_PID" ]; then
              OLD_PID=$(cat "$APP_PID")
              if ps -p "$OLD_PID" > /dev/null 2>&1; then
                echo "Killing old process from pid file: $OLD_PID"
                kill -15 "$OLD_PID" || true
                sleep 5
              fi
              rm -f "$APP_PID"
            fi

            echo "Stopping process using port 8080..."
            PORT_PID=$(lsof -ti:8080 || true)

            if [ -n "$PORT_PID" ]; then
              echo "Killing process using 8080: $PORT_PID"
              kill -15 $PORT_PID || true
              sleep 5
            fi

            PORT_PID=$(lsof -ti:8080 || true)

            if [ -n "$PORT_PID" ]; then
              echo "Force killing process using 8080: $PORT_PID"
              kill -9 $PORT_PID || true
              sleep 2
            fi

            echo "Starting new application..."
            nohup env \
              R2_ACCESS_KEY="${{ secrets.R2_ACCESS_KEY }}" \
              R2_SECRET_KEY="${{ secrets.R2_SECRET_KEY }}" \
              R2_ENDPOINT="${{ secrets.R2_ENDPOINT }}" \
              R2_PUBLIC_URL="${{ secrets.R2_PUBLIC_URL }}" \
              RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}" \
              RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
              DB_HOST="${{ secrets.DB_HOST }}" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              java -jar "$APP_JAR" \
              --spring.profiles.active=prod \
              > "$APP_LOG" 2>&1 &

            echo $! > "$APP_PID"

            sleep 8

            echo "Started process:"
            ps -p $(cat "$APP_PID") -f || true

            echo "Recent logs:"
            tail -n 80 "$APP_LOG"